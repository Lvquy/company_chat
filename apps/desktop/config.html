<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cấu hình Company Chat Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #151922;
        --panel: #20252f;
        --muted: #9ba4b7;
        --line: rgba(255, 255, 255, 0.08);
        --primary: linear-gradient(180deg, #4c82ff 0%, #356bf0 100%);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(76, 130, 255, 0.22), transparent 30%),
          var(--bg);
        color: #f4f7ff;
      }

      .panel {
        width: min(720px, calc(100vw - 40px));
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(32, 37, 47, 0.96);
        padding: 32px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 36px;
        line-height: 1.04;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .field { margin-top: 24px; }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 13px;
        color: #d6def1;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #171c24;
        color: #fff;
        font-size: 16px;
        padding: 16px 18px;
        outline: none;
      }

      input:focus {
        border-color: rgba(76, 130, 255, 0.75);
      }

      .hint {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .error {
        display: none;
        margin-top: 18px;
        border-radius: 16px;
        background: rgba(219, 74, 96, 0.16);
        border: 1px solid rgba(219, 74, 96, 0.28);
        color: #ffcad2;
        padding: 14px 16px;
      }

      .error.show { display: block; }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 24px;
      }

      button {
        border: 0;
        border-radius: 18px;
        padding: 15px 20px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        color: #fff;
        background: var(--primary);
        min-width: 220px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Cấu hình ứng dụng</h1>
      <p>
        Chỉ cấu hình URL server self-host. Tên công ty và logo sẽ do admin chỉnh trong phần quản trị.
      </p>

      <div class="field">
        <label for="serverUrl">SERVER_BASE_URL</label>
        <input id="serverUrl" type="text" placeholder="https://chat.company.vn" />
        <div class="hint">
          Ví dụ: https://chat.company.vn hoặc http://192.168.1.10 hoặc http://localhost:3000
        </div>
      </div>

      <div id="errorBox" class="error"></div>

      <div class="actions">
        <button id="saveButton" class="primary" type="button">Lưu và mở app</button>
      </div>
    </main>

    <script>
      const input = document.getElementById("serverUrl");
      const saveButton = document.getElementById("saveButton");
      const errorBox = document.getElementById("errorBox");

      function setError(message) {
        errorBox.textContent = message || "";
        errorBox.classList.toggle("show", Boolean(message));
      }

      async function bootstrap() {
        const config = await window.desktopApp.getConfig();
        input.value = config.serverUrl || "";

        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        if (error) {
          setError(error);
        }
      }

      saveButton.addEventListener("click", async () => {
        setError("");
        const response = await window.desktopApp.saveConfig({
          serverUrl: input.value,
        });
        if (!response.ok) {
          setError(response.message);
        }
      });

      bootstrap();
    </script>
  </body>
</html>
